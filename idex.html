<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia Visual de Redes para Automação</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f0f2f5;
}

header{
    background:#0b5ed7;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    display:flex;
}

nav button{
    flex:1;
    padding:15px;
    border:none;
    background:#1f6fe5;
    color:white;
    cursor:pointer;
    font-size:16px;
}

nav button:hover{
    background:#0b5ed7;
}

section{
    display:none;
    padding:20px;
}

section.ativo{
    display:block;
}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    width:200px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    text-align:center;
}

.card:hover{
    background:#dfefff;
}

#resultado,#topo{
    margin-top:20px;
    background:white;
    padding:20px;
    border-radius:10px;
}

button.op{
    padding:10px 20px;
    margin:5px;
}
</style>

</head>
<body>

<header>
<h1>Guia Visual de Redes para Automação</h1>
</header>

<nav>
<button onclick="mostrar('cabos')">Cabos Industriais</button>
<button onclick="mostrar('topologias')">Topologias</button>
</nav>

<section id="cabos" class="ativo">

<div class="cards">

<div class="card" onclick="cabo('par')">
<h3>Par Trançado</h3>
</div>

<div class="card" onclick="cabo('fibra')">
<h3>Fibra Óptica</h3>
</div>

<div class="card" onclick="cabo('wifi')">
<h3>Wireless</h3>
</div>

</div>

<div id="resultado">
Clique em um cabo.
</div>

</section>

<section id="topologias">

<button class="op" onclick="topologia('estrela')">
Layout em Estrela
</button>

<button class="op" onclick="topologia('barramento')">
Layout em Barramento
</button>

<div id="topo">
Escolha uma topologia.
</div>

</section>

<script>

function mostrar(id){

document.getElementById("cabos").classList.remove("ativo");
document.getElementById("topologias").classList.remove("ativo");

document.getElementById(id).classList.add("ativo");

}

function cabo(tipo){

let texto="";

if(tipo=="par"){
texto="<h2>Par Trançado</h2><p>Usado para ligar CLPs, sensores, computadores e IHMs dentro da fábrica.</p>";
}

if(tipo=="fibra"){
texto="<h2>Fibra Óptica</h2><p>Usada em longas distâncias e locais com muita interferência elétrica.</p>";
}

if(tipo=="wifi"){
texto="<h2>Wireless</h2><p>Usado para equipamentos móveis como tablets e coletores de dados.</p>";
}

document.getElementById("resultado").innerHTML=texto;

}

function topologia(tipo){

let texto="";

if(tipo=="estrela"){

texto="<h2>Layout em Estrela</h2><p>Todos os equipamentos são ligados a um switch.</p><h3>Vantagens</h3><ul><li>Fácil manutenção</li><li>Organização</li><li>Falhas isoladas</li></ul><h3>Desvantagens</h3><ul><li>Mais cabos</li><li>Depende do switch</li></ul>";

}

if(tipo=="barramento"){

texto="<h2>Layout em Barramento</h2><p>Todos os equipamentos usam um único cabo principal.</p><h3>Vantagens</h3><ul><li>Menos cabos</li><li>Baixo custo</li></ul><h3>Desvantagens</h3><ul><li>Uma falha pode parar a rede</li><li>Manutenção mais difícil</li></ul>";

}

document.getElementById("topo").innerHTML=texto;

}

</script>

</body>
</html>
