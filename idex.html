<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia Visual de Redes para Automação</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#0d47a1;
    color:white;
    text-align:center;
    padding:20px;
}

.tabs{
    display:flex;
    justify-content:center;
    background:#1565c0;
}

.tab{
    padding:15px 25px;
    color:white;
    cursor:pointer;
    transition:.3s;
}

.tab:hover{
    background:#0d47a1;
}

.tab.active{
    background:#08306b;
}

.content{
    display:none;
    padding:30px;
}

.content.active{
    display:block;
}

.cards{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    width:220px;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.info{
    margin-top:25px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.buttons{
    text-align:center;
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    background:#1565c0;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0d47a1;
}

ul{
    margin-left:20px;
    margin-top:10px;
}

h3{
    color:#0d47a1;
    margin-bottom:10px;
}
</style>
</head>

<body>

<header>
    <h1>Guia Visual de Redes para Automação</h1>
</header>

<div class="tabs">
    <div class="tab active" onclick="abrirAba('cabos', this)">
        Cabos Industriais
    </div>

    <div class="tab" onclick="abrirAba('topologias', this)">
        Topologias
    </div>
</div>

<!-- CABOS -->
<div id="cabos" class="content active">

    <div class="cards">

        <div class="card" onclick="mostrarCabo('par')">
            <h2>Par Trançado</h2>
        </div>

        <div class="card" onclick="mostrarCabo('fibra')">
            <h2>Fibra Óptica</h2>
        </div>

        <div class="card" onclick="mostrarCabo('wireless')">
            <h2>Wireless</h2>
        </div>

    </div>

    <div class="info" id="infoCabos">
        Clique em um dos cartões para ver a explicação.
    </div>

</div>

<!-- TOPOLOGIAS -->
<div id="topologias" class="content">

    <div class="buttons">
        <button onclick="mostrarTopologia('estrela')">
            Layout em Estrela
        </button>

        <button onclick="mostrarTopologia('barramento')">
            Layout em Barramento
        </button>
    </div>

    <div class="info" id="infoTopo">
        Clique em um botão para visualizar a explicação.
    </div>

</div>

<script>

function abrirAba(id, elemento){

    document.querySelectorAll(".content").forEach(c=>{
        c.classList.remove("active");
    });

    document.querySelectorAll(".tab").forEach(t=>{
        t.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
    elemento.classList.add("active");
}

function mostrarCabo(tipo){

    let texto="";

    if(tipo==="par"){
        texto=`
        <h3>Par Trançado</h3>
        <p>
        É muito usado para ligar CLPs, sensores, IHMs e computadores
        dentro da fábrica em distâncias menores.
        </p>
        `;
    }

    if(tipo==="fibra"){
        texto=`
        <h3>Fibra Óptica</h3>
        <p>
        É usada para conectar setores da fábrica em longas distâncias
        e locais com muita interferência elétrica.
        </p>
        `;
    }

    if(tipo==="wireless"){
        texto=`
        <h3>Wireless</h3>
        <p>
        É utilizado para conectar tablets, coletores de dados,
        AGVs e equipamentos móveis sem uso de cabos.
        </p>
        `;
    }

    document.getElementById("infoCabos").innerHTML=texto;
}

function mostrarTopologia(tipo){

    let texto="";

    if(tipo==="estrela"){

        texto=`
        <h3>Layout em Estrela</h3>

        <p>
        Todos os equipamentos são ligados a um equipamento central,
        normalmente um switch industrial.
        </p>

        <h4>Vantagens</h4>
        <ul>
            <li>Fácil manutenção.</li>
            <li>Falha em um cabo não afeta os demais.</li>
            <li>Boa organização da rede.</li>
        </ul>

        <h4>Desvantagens</h4>
        <ul>
            <li>Maior quantidade de cabos.</li>
            <li>Depende do equipamento central.</li>
        </ul>
        `;
    }

    if(tipo==="barramento"){

        texto=`
        <h3>Layout em Barramento</h3>

        <p>
        Todos os equipamentos compartilham o mesmo cabo principal.
        </p>

        <h4>Vantagens</h4>
        <ul>
            <li>Menor quantidade de cabos.</li>
            <li>Instalação simples.</li>
        </ul>

        <h4>Desvantagens</h4>
        <ul>
            <li>Uma falha pode afetar toda a rede.</li>
            <li>Mais difícil localizar problemas.</li>
        </ul>
        `;
    }

    document.getElementById("infoTopo").innerHTML=texto;
}

</script>

</body>
</html>
